<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>20 крупнейших нефтяных месторождений России</title>
<meta name="description" content="Интерактивная карта и обзор крупнейших нефтяных месторождений России">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:#e2e8f0;
}

.container{
  padding:20px;
  max-width:1100px;
  margin:auto;
}

h1,h2,h3{margin:0 0 10px}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:16px;
  margin:10px 0;
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.grid{
  display:grid;
  gap:15px;
}

@media(min-width:768px){
  .grid{grid-template-columns:repeat(2,1fr)}
}

@media(min-width:1024px){
  .grid{grid-template-columns:repeat(3,1fr)}
}

#map{
  height:500px;
  border-radius:16px;
  margin-top:15px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.like{background:#22c55e}
.dislike{background:#ef4444}

.rating{font-size:20px}

.footer{
  background:#020617;
  padding:20px;
  text-align:center;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>20 крупнейших нефтяных месторождений России</h1>
<p>Интерактивный обзор ключевых нефтяных регионов России с картой и описанием.</p>

<h2>Карта месторождений</h2>
<div id="map"></div>

<h2>Рейтинг месторождений</h2>
<div class="grid" id="cards"></div>

</div>

<div class="footer">
<p>© 2026 Нефтяная аналитика России</p>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// 🛢️ 20 нефтяных месторождений РФ
const fields = [
{
name:"Самотлорское",
coords:[60.94,76.56],
desc:"Крупнейшее нефтяное месторождение России, ХМАО. Открыто в 1965 году."
},
{
name:"Приобское",
coords:[61.0,73.5],
desc:"Одно из самых крупных и технологически сложных месторождений Западной Сибири."
},
{
name:"Ромашкинское",
coords:[54.6,52.4],
desc:"Главное месторождение Татарстана, одно из старейших в России."
},
{
name:"Фёдоровское",
coords:[61.0,72.3],
desc:"ХМАО, важный актив Сургутского региона."
},
{
name:"Лянторское",
coords:[61.6,72.1],
desc:"Западная Сибирь, стабильная добыча нефти."
},
{
name:"Салымское",
coords:[60.3,71.5],
desc:"ХМАО, активно разрабатываемое месторождение."
},
{
name:"Приразломное",
coords:[69.7,57.8],
desc:"Первое арктическое шельфовое нефтяное месторождение России."
},
{
name:"Ванкорское",
coords:[63.9,83.3],
desc:"Красноярский край, ключевой проект Восточной Сибири."
},
{
name:"Русское",
coords:[68.2,78.0],
desc:"ЯНАО, высоковязкая нефть."
},
{
name:"Новопортовское",
coords:[67.7,72.9],
desc:"Ямал, крупный центр нефтедобычи."
},
{
name:"Пякяхинское",
coords:[67.4,77.7],
desc:"ЯНАО, комплексное нефтегазовое месторождение."
},
{
name:"Талаканское",
coords:[59.8,110.8],
desc:"Якутия, Восточная Сибирь."
},
{
name:"Чаяндинское",
coords:[62.0,112.0],
desc:"Ключевое месторождение для проекта «Сила Сибири»."
},
{
name:"Куюмбинское",

},
{
name:"Юрубчено-Тохомское",
coords:[61.5,94.5],
desc:"Восточная Сибирь, сложная геология."
},
{
name:"Заполярное",
coords:[67.5,77.0],
desc:"ЯНАО, одно из крупнейших газонефтяных месторождений."
},
{
name:"Мессояхское",
coords:[71.5,83.0],
desc:"Арктическая зона, тяжёлые условия добычи."
},
{
name:"Верхнечонское",
coords:[59.8,111.0],
desc:"Иркутская область, Восточная Сибирь."
},
{
name:"Сузунское",
coords:[70.5,82.0],
desc:"Арктический проект «Роснефти»."
},
{
name:"Южно-Приобское",
coords:[61.1,73.6],
desc:"Часть гигантского Приобского кластера."
}
];

// 🗺️ Инициализация карты
const map = L.map('map').setView([62, 90], 3);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

// 📌 Маркеры на карте
fields.forEach(f=>{
L.marker(f.coords)
.addTo(map)
.bindPopup(`<b>${f.name}</b><br>${f.desc}`);
});

// 🧱 Карточки
const cards = document.getElementById("cards");

fields.forEach(f=>{
cards.innerHTML += `
<div class="card">
<h3>${f.name}</h3>
<p>${f.desc}</p>
</div>
`;
});

</script>

</body>
</html>
